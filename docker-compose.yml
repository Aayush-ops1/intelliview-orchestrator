services:
  redis:
    image: redis:latest
    container_name: ai-interview-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_REPLICATION_MODE=master
    volumes:
      - redis_data:/data
    networks:
      - ai-interview-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: ai-interview-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_interview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-interview-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-interview-fastapi
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ai_interview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      API_TOKEN: "${API_TOKEN:-dev-token-change-me}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-*}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ai-interview-network
    command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-interview-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ai_interview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      API_URL: "http://fastapi:8000"
      API_TOKEN: "${API_TOKEN:-dev-token-change-me}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-4}"
      WORKER_ID: "${WORKER_ID:-worker-1}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_started
    volumes:
      - .:/app
    networks:
      - ai-interview-network
    command: python -m workers.worker_entrypoint
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-interview-flower
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
      API_TOKEN: "${API_TOKEN:-dev-token-change-me}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-interview-network
    command: celery -A workers.celery_app.celery_app flower --url_prefix=flower

volumes:
  redis_data:
  postgres_data:

networks:
  ai-interview-network:
    driver: bridge
